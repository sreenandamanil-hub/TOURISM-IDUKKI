<script>
function checkPlace()
{
    var input = document.getElementsByName("q")[0].value;
    var options = document.getElementById("places").options;

    for(var i=0; i<options.length; i++)
    {
        if(input.toLowerCase() == options[i].value.toLowerCase())
        {
            return true;
        }
    }

    alert("Please select a tourist place from the list.");
    return false;
}
</script>
