<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#E8F5E9;
    font-family:Arial,sans-serif;
}

.header{
    background:#1B4332;
    text-align:center;
    padding:15px;
}

.header img{
    width:100%;
    max-height:180px;
    object-fit:cover;
}

.header h1{
    color:white;
    margin:15px 0 5px;
    font-size:40px;
}

.header p{
    color:#D8F3DC;
    margin:0;
    font-size:18px;
}

@media(max-width:768px){
    .header h1{
        font-size:28px;
    }

    .header p{
        font-size:15px;
    }

    .header img{
        max-height:120px;
    }
}
</style>
</head>

<body>

<div class="header">
    <img src="idukki.png" alt="Idukki">
    <h1>IDUKKI TOURISM</h1>
    <p>Beautiful Places of Idukki District</p>
</div>

</body>
</html>
